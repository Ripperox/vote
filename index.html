<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAO Governance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Toast container (slides in from top-right) -->
  <div id="toastContainer" aria-live="polite" aria-atomic="false"></div>

  <!-- ============================================================
       HEADER
  ============================================================ -->
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-logo" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 1L16 5V13L9 17L2 13V5L9 1Z" stroke="white" stroke-width="1.5" fill="none"/>
            <circle cx="9" cy="9" r="2.5" fill="white"/>
          </svg>
        </div>
        <span class="header-title">DAO Governance</span>
      </div>

      <div class="header-actions">
        <div class="voting-power-chip" id="votingPower">0 Votes</div>
        <button id="connectBtn" aria-label="Connect MetaMask wallet">
          Connect Wallet
        </button>
      </div>
    </div>
  </header>

  <!-- ============================================================
       STATS BAR
  ============================================================ -->
  <section class="stats-bar" aria-label="Governance statistics">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Proposals</div>
        <div class="stat-value" id="totalProposals">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Proposals</div>
        <div class="stat-value" id="activeProposals">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Your Voting Power</div>
        <div class="stat-value" id="myVotingPower">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Quorum Required</div>
        <div class="stat-value" id="quorumDisplay">10 Votes</div>
      </div>
    </div>
  </section>

  <!-- ============================================================
       OWNER ADMIN PANEL (shown only to contract owner)
  ============================================================ -->
  <div id="adminPanel" class="admin-panel" style="display:none;" aria-label="Owner admin panel">
    <div class="admin-inner">
      <div class="admin-badge">&#x1F511; Owner</div>
      <div class="admin-content">
        <p class="admin-desc">You are the contract owner. Add wallet addresses as DAO members.</p>
        <div class="admin-form">
          <input
            id="memberAddressInput"
            type="text"
            class="admin-input"
            placeholder="0x... wallet address to add as member"
            spellcheck="false"
            autocomplete="off"
          />
          <button id="addMemberBtn" class="btn-add-member">Add Member</button>
          <button id="addSelfBtn" class="btn-add-self">Add Myself</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       MAIN CONTENT
  ============================================================ -->
  <main>
    <div class="content-header">
      <!-- Tab navigation -->
      <nav class="tabs" role="tablist" aria-label="Filter proposals by state">
        <button class="tab-btn active" data-tab="active"    role="tab" aria-selected="true">Active</button>
        <button class="tab-btn"        data-tab="pending"   role="tab" aria-selected="false">Pending</button>
        <button class="tab-btn"        data-tab="succeeded" role="tab" aria-selected="false">Succeeded</button>
        <button class="tab-btn"        data-tab="defeated"  role="tab" aria-selected="false">Defeated</button>
      </nav>

      <button id="createProposalBtn" class="btn-create" disabled aria-haspopup="dialog">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M7 1V13M1 7H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        New Proposal
      </button>
    </div>

    <!-- Proposal cards render here -->
    <div id="proposalsContainer" role="list" aria-label="Proposals"></div>
  </main>

  <!-- ============================================================
       CREATE PROPOSAL MODAL
  ============================================================ -->
  <div
    id="modalOverlay"
    class="modal-overlay"
    aria-hidden="true"
  ></div>

  <div
    id="proposalModal"
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
    aria-hidden="true"
  >
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Create Proposal</h2>
      <button
        id="closeModalBtn"
        class="modal-close"
        aria-label="Close dialog"
      >&#x2715;</button>
    </div>

    <div class="modal-body">
      <label class="field-label" for="proposalDesc">Proposal Description</label>
      <textarea
        id="proposalDesc"
        class="field-textarea"
        placeholder="Describe what this proposal aims to achieve and why members should support it..."
        rows="5"
      ></textarea>
      <p class="field-hint">
        Be clear and specific. This description will be stored permanently on-chain.
      </p>
    </div>

    <div class="modal-footer">
      <button id="cancelModalBtn" class="btn-secondary">Cancel</button>
      <button id="submitProposalBtn" class="btn-primary">Submit Proposal</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.0/ethers.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
